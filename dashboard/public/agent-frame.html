<html><body><script>
window.addEventListener("message", async (e) => {
  if (e.data?.type !== "agent-request") return;
  const { id, url, key, body } = e.data;
  const parent = e.source;

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    parent.postMessage({ id, type: "status", status: res.status }, "*");
    if (!res.ok || !res.body) {
      parent.postMessage({ id, type: "error", message: await res.text() }, "*");
      return;
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = "", evt = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split("\n");
      buf = parts.pop() || "";
      for (const line of parts) {
        const t = line.trim();
        if (!t || t.startsWith(":")) continue;
        if (t.startsWith("event: ")) { evt = t.slice(7); continue; }
        if (!t.startsWith("data: ") || t === "data: [DONE]") continue;
        try {
          const json = JSON.parse(t.slice(6));
          parent.postMessage({ id, type: "event", event: evt, data: json }, "*");
          if (evt === "turn_complete") { reader.cancel(); parent.postMessage({ id, type: "done" }, "*"); return; }
        } catch {}
        evt = "";
      }
    }
    parent.postMessage({ id, type: "done" }, "*");
  } catch (err) {
    parent.postMessage({ id, type: "error", message: err.message }, "*");
  }
});
window.parent.postMessage({ type: "agent-frame-ready" }, "*");
</script></body></html>
